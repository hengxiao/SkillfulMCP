# Alembic configuration for SkillfulMCP.
#
# The real connection URL is injected at runtime by migrations/env.py from
# the MCP_DATABASE_URL environment variable (or mcp_server.config.Settings).
# Do NOT set sqlalchemy.url here — the placeholder below is intentionally
# unresolvable so an accidental plain `alembic` invocation against this file
# fails loudly rather than silently using sqlite:///./skillful_mcp.db.

[alembic]
script_location = migrations
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s
sqlalchemy.url = driver://user:pass@host/dbname

# Recognize version files that start with a 4-digit sequence (001_, 0001_, …)
# in addition to the default date-based format.
timezone = UTC

# Logging config for `alembic` CLI invocations. The application lifecycle
# uses its own JSON formatter, so these settings only apply when someone
# runs `alembic upgrade head` from the shell.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
