<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}SkillfulMCP{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background: #f5f6fa; }
    .navbar-brand { font-weight: 700; letter-spacing: -.3px; }
    .table td, .table th { vertical-align: middle; }
    .badge-mono { font-family: ui-monospace, monospace; font-size: .8em; }
    .metadata-area { font-family: ui-monospace, monospace; font-size: .85em; min-height: 100px; }
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: inline-block; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
  <div class="container">
    <a class="navbar-brand" href="/"><i class="bi bi-cpu me-1"></i>SkillfulMCP</a>
    <div class="navbar-nav ms-3">
      <a class="nav-link {% if active == 'dashboard' %}active fw-semibold{% endif %}" href="/">
        <i class="bi bi-speedometer2 me-1"></i>Dashboard
      </a>
      <a class="nav-link {% if active == 'skillsets' %}active fw-semibold{% endif %}" href="/skillsets">
        <i class="bi bi-collection me-1"></i>Skillsets
      </a>
      <a class="nav-link {% if active == 'skills' %}active fw-semibold{% endif %}" href="/skills">
        <i class="bi bi-lightning me-1"></i>Skills
      </a>
    </div>
  </div>
</nav>

<div class="container pb-5">

  {% if error %}
  <div class="alert alert-danger d-flex align-items-center gap-2 mb-4" role="alert">
    <i class="bi bi-exclamation-triangle-fill flex-shrink-0"></i>
    <div>{{ error }}</div>
  </div>
  {% endif %}

  {% if msg %}
  <div class="alert alert-{{ 'success' if msg_type == 'success' else 'danger' }} alert-dismissible fade show mb-4" role="alert">
    <i class="bi bi-{{ 'check-circle' if msg_type == 'success' else 'x-circle' }} me-2"></i>{{ msg }}
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
  </div>
  {% endif %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/htmx.org@1.9.12/dist/htmx.min.js"></script>
</body>
</html>
