# Local dev stack: catalog + webui + Postgres.
#
#   make docker-up           # foreground
#   make docker-up-detach    # background
#   make docker-down         # stop + remove
#
# Optional extras live under named profiles. Combine as needed:
#   docker compose --profile extras up -d
#       MinIO (S3), MailHog (SMTP).
#   docker compose --profile obs up -d
#       Loki + Promtail + Grafana for log tailing at :3000.
#   docker compose --profile extras --profile obs up -d
#       The whole works.
# (docker-compose v1 honors --profile the same way.)
#
# Credentials are intentionally hard-coded for the dev profile — this
# file never runs in production. For staging / prod, generate a fresh
# docker-compose.<env>.yml that pulls from a secret manager.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mcp
      POSTGRES_PASSWORD: mcp
      POSTGRES_DB: mcp
    # Expose only on localhost to avoid fighting a host-side postgres
    # on 5432. Other services reach it via the internal bridge by
    # name regardless.
    ports:
      - "127.0.0.1:55432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcp -d mcp"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ------------------------------------------------------------------ #
  # Optional S3 store (MinIO)                                          #
  # ------------------------------------------------------------------ #
  minio:
    image: quay.io/minio/minio:latest
    profiles: ["extras"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: mcp-minio
      MINIO_ROOT_PASSWORD: mcp-minio-password
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      # readiness probe — /minio/health/ready comes up ~5s after boot
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9000/minio/health/ready"]
      interval: 5s
      timeout: 3s
      retries: 20

  # One-shot init: create the bundle bucket. Runs once + exits.
  minio-init:
    image: minio/mc:latest
    profiles: ["extras"]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 mcp-minio mcp-minio-password &&
      mc mb --ignore-existing local/mcp-bundles &&
      echo 'bucket ready';
      "
    restart: "no"

  # ------------------------------------------------------------------ #
  # Optional SMTP (MailHog — captures every outbound email)             #
  # ------------------------------------------------------------------ #
  mailhog:
    image: mailhog/mailhog:latest
    profiles: ["extras"]
    ports:
      - "127.0.0.1:1025:1025"   # SMTP
      - "127.0.0.1:8025:8025"   # Web UI at http://localhost:8025
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://127.0.0.1:8025/api/v2/messages > /dev/null"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ------------------------------------------------------------------ #
  # Catalog                                                             #
  # ------------------------------------------------------------------ #
  catalog:
    build:
      context: .
      dockerfile: deploy/Dockerfile.catalog
    image: skillful-mcp/catalog:dev
    ports:
      - "8000:8000"
    environment:
      # Change these before exposing the stack beyond localhost.
      MCP_JWT_SECRET: "dev-only-jwt-secret-please-rotate"
      MCP_ADMIN_KEY: "dev-only-admin-key"
      MCP_DATABASE_URL: "postgresql://mcp:mcp@postgres:5432/mcp"
      MCP_MAX_TOKEN_LIFETIME_SECONDS: "3600"
      MCP_LOG_LEVEL: "INFO"
      # Wave 9: required — catalog refuses to start otherwise.
      # Bcrypt hash of the dev superadmin password "superadmin-dev-pw".
      # Rotate before shipping. Generate a new one with:
      #   docker run --rm skillful-mcp/catalog:dev \
      #     python -c "from mcp_server.pwhash import hash_password; \
      #                print(hash_password('your-password'))"
      # The $$ escapes $ for docker-compose variable interpolation.
      MCP_SUPERADMIN_PASSWORD_HASH: "$$2b$$12$$usSAgmWuF3TEMsQhUbgZ/OKs4oHmRm7JuIvuamrmtkGu56QddrWJm"

      # Wave 5 — S3 bundle store. Defaults pick up whatever is in the
      # operator's env (or empty strings). Enable by exporting:
      #   export MCP_BUNDLE_STORE=s3
      # before `docker-compose --profile extras up`. Leaving these
      # unset keeps inline storage. When set, MinIO under the extras
      # profile provides the S3 API.
      MCP_BUNDLE_STORE: "${MCP_BUNDLE_STORE:-inline}"
      MCP_BUNDLE_S3_BUCKET: "${MCP_BUNDLE_S3_BUCKET:-mcp-bundles}"
      MCP_BUNDLE_S3_PREFIX: "${MCP_BUNDLE_S3_PREFIX:-bundles}"
      MCP_BUNDLE_S3_REGION: "${MCP_BUNDLE_S3_REGION:-us-east-1}"
      MCP_BUNDLE_S3_ENDPOINT_URL: "${MCP_BUNDLE_S3_ENDPOINT_URL:-http://minio:9000}"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-mcp-minio}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-mcp-minio-password}"

      # Wave 9 item F — SMTP invitations. Leave MCP_SMTP_HOST unset
      # and outbound mail is a silent NullMailer no-op. When the
      # extras profile is up, setting MCP_SMTP_HOST=mailhog routes
      # every invite email to the MailHog capture UI at :8025.
      MCP_SMTP_HOST: "${MCP_SMTP_HOST:-}"
      MCP_SMTP_PORT: "${MCP_SMTP_PORT:-1025}"
      MCP_SMTP_FROM: "${MCP_SMTP_FROM:-noreply@skillful-mcp.dev}"
      MCP_SMTP_TLS: "${MCP_SMTP_TLS:-0}"
      MCP_WEBUI_PUBLIC_URL: "${MCP_WEBUI_PUBLIC_URL:-http://localhost:8080}"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    labels:
      logging: promtail
      service: catalog

  webui:
    build:
      context: .
      dockerfile: deploy/Dockerfile.webui
    image: skillful-mcp/webui:dev
    ports:
      - "8080:8080"
    environment:
      MCP_SERVER_URL: "http://catalog:8000"
      MCP_ADMIN_KEY: "dev-only-admin-key"
      # Rotate this before shipping — it signs the session cookie.
      MCP_WEBUI_SESSION_SECRET: "dev-only-session-secret-please-rotate"
      # No operators by default — set this via docker-compose override
      # to enable login. Run once to generate a hash:
      #   docker run --rm skillful-mcp/webui:dev \
      #     python -c "from webui.auth import hash_password; print(hash_password('mypassword'))"
      MCP_WEBUI_OPERATORS: "[]"
    depends_on:
      catalog:
        condition: service_healthy
    restart: unless-stopped
    labels:
      logging: promtail
      service: webui

  # ------------------------------------------------------------------ #
  # Observability (profile: obs)                                        #
  # ------------------------------------------------------------------ #
  loki:
    image: grafana/loki:3.0.1
    profiles: ["obs"]
    command: -config.file=/etc/loki/config.yml
    volumes:
      - ./deploy/observability/loki-config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    ports:
      - "127.0.0.1:3100:3100"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3100/ready"]
      interval: 10s
      timeout: 3s
      retries: 30

  promtail:
    # 3.x is needed for Docker 29's API 1.44; older Promtails only
    # speak API 1.42 and fail target discovery.
    image: grafana/promtail:3.0.1
    profiles: ["obs"]
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./deploy/observability/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail_positions:/tmp
    depends_on:
      loki:
        condition: service_healthy

  grafana:
    image: grafana/grafana:10.4.3
    profiles: ["obs"]
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./deploy/observability/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 10s
      timeout: 3s
      retries: 30

volumes:
  pg_data:
  minio_data:
  loki_data:
  promtail_positions:
  grafana_data:
