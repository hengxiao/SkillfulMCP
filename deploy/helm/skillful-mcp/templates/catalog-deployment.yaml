{{- if .Values.catalog.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "skillful-mcp.catalog.fullname" . }}
  labels:
    {{- include "skillful-mcp.labels" . | nindent 4 }}
    app.kubernetes.io/component: catalog
spec:
  {{- if not .Values.catalog.hpa.enabled }}
  replicas: {{ .Values.catalog.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "skillful-mcp.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: catalog
  template:
    metadata:
      labels:
        {{- include "skillful-mcp.labels" . | nindent 8 }}
        app.kubernetes.io/component: catalog
      {{- with .Values.catalog.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "skillful-mcp.serviceAccountName" . }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: catalog
          image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}-catalog:{{ .Values.image.catalogTag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "skillful-mcp.fullname" . }}-config
            - secretRef:
                name: {{ .Values.existingSecret | required "values.existingSecret is required" }}
          {{- with .Values.catalog.extraEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            {{- toYaml .Values.catalog.resources | nindent 12 }}
          volumeMounts:
            # readOnlyRootFilesystem=true means we still need a writable
            # /tmp for uvicorn + CPython scratch.
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      {{- with .Values.catalog.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.catalog.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.catalog.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end -}}
