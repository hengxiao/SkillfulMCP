{{- if .Values.webui.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "skillful-mcp.webui.fullname" . }}
  labels:
    {{- include "skillful-mcp.labels" . | nindent 4 }}
    app.kubernetes.io/component: webui
spec:
  {{- if not .Values.webui.hpa.enabled }}
  replicas: {{ .Values.webui.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "skillful-mcp.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: webui
  template:
    metadata:
      labels:
        {{- include "skillful-mcp.labels" . | nindent 8 }}
        app.kubernetes.io/component: webui
      {{- with .Values.webui.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "skillful-mcp.serviceAccountName" . }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: webui
          image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}-webui:{{ .Values.image.webuiTag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: MCP_SERVER_URL
              value: "http://{{ include "skillful-mcp.catalog.fullname" . }}:{{ .Values.catalog.service.port }}"
          envFrom:
            - configMapRef:
                name: {{ include "skillful-mcp.fullname" . }}-config
            - secretRef:
                name: {{ .Values.existingSecret | required "values.existingSecret is required" }}
          {{- with .Values.webui.extraEnv }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /login
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /login
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            {{- toYaml .Values.webui.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      {{- with .Values.webui.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.webui.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.webui.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end -}}
